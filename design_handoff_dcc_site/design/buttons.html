<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buttons — DCC Design System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #F6F6F6; padding: 40px; color: #111; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 40px; }
  .section { background: #fff; border: 1px solid #E2E2E2; border-radius: 12px; padding: 32px; margin-bottom: 24px; }
  .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 20px; }
  .row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: #C41E1E; color: #fff; box-shadow: 0 2px 8px rgba(196,30,30,0.3); }
  .btn-primary:hover { background: #9E1515; box-shadow: 0 4px 14px rgba(196,30,30,0.4); transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: #111; border: 1.5px solid #E2E2E2; }
  .btn-secondary:hover { background: #F0F0F0; border-color: #8A8A8A; }
  .btn-ghost { background: transparent; color: #C41E1E; padding-left: 0; padding-right: 0; font-weight: 600; font-size: 0.9rem; border: none; }
  .btn-accent { background: #1A6B1A; color: #fff; box-shadow: 0 2px 8px rgba(26,107,26,0.3); }
  .btn-accent:hover { background: #115011; }
  .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
  .btn-lg { padding: 0.85rem 1.8rem; font-size: 1rem; }

  /* dark section */
  .dark { background: #1C1C1C; border-color: #2E2E2E; }
  .dark .section-label { color: #686868; }
  .btn-primary-dark { background: #E53535; color: #fff; }
  .btn-secondary-dark { background: transparent; color: #EDEDED; border: 1.5px solid #3E3E3E; }
</style>
</head>
<body>
  <h1>Buttons</h1>
  <p class="subtitle">Three variants · Two colour-scheme modes · Three sizes.</p>

  <div class="section">
    <div class="section-label">Light Mode</div>
    <div class="row">
      <a class="btn btn-primary" href="#">Join the Club</a>
      <a class="btn btn-secondary" href="#">Upcoming Events</a>
      <a class="btn btn-ghost" href="#">View Past Results <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>
      <a class="btn btn-accent" href="#">Email Us</a>
    </div>
    <div class="section-label" style="margin-top:24px;">Sizes</div>
    <div class="row">
      <a class="btn btn-primary btn-sm" href="#">Small</a>
      <a class="btn btn-primary" href="#">Default</a>
      <a class="btn btn-primary btn-lg" href="#">Large</a>
    </div>
  </div>

  <div class="section dark">
    <div class="section-label">Dark Mode</div>
    <div class="row">
      <a class="btn btn-primary-dark btn-primary" href="#">Join the Club</a>
      <a class="btn btn-secondary-dark" href="#">Upcoming Events</a>
      <a class="btn btn-ghost" href="#">View Past Results <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>
    </div>
  </div>
</body>
</html>
